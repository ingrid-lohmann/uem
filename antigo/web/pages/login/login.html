<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../css/global.style.css">
  <link rel="stylesheet" href="../../css/login.css">
  <link rel="stylesheet" href="../../css/input.css">
  <link rel="stylesheet" href="../../css/button.css">
  <title>PerfilZ</title>
</head>

<body>
  <div class="login-container">
    <p class="login-container__title">Login</p>
    <form class="login-container__form">
      <div class="input-container">
        <input id="user" class="input" type="text" pattern=".+" required />
        <label class="label" for="user">Usuário</label>
      </div>

      <div class="input-container">
        <input id="password" class="input" type="password" pattern=".+" required />
        <label class="label" for="password">Senha</label>
      </div>

      <div class="login-container__forgot-password">
        <a>Esqueceu a senha?</a>
      </div>

      <button type="submit" disabled>Acessar</button>
    </form>
  </div>
</body>

</html>
